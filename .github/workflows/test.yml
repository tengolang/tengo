name: test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: go vet ./...

      - run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - run: go test -race -cover ./...

      - run: go run ./cmd/tengo -resolve ./testdata/cli/test.tengo
